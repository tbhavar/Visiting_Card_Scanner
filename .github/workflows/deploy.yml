name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config.js
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'js/config.js';
            let content = fs.readFileSync(path, 'utf8');
            
            content = content.replace(/__AUTH_HASH__/g, process.env.AUTH_PASSWORD_HASH || '');
            content = content.replace(/__GEMINI_API_KEY__/g, process.env.GEMINI_API_KEY || '');
            content = content.replace(/__EMAILJS_PUBLIC_KEY__/g, process.env.EMAILJS_PUBLIC_KEY || '');
            content = content.replace(/__EMAILJS_SERVICE_ID__/g, process.env.EMAILJS_SERVICE_ID || '');
            content = content.replace(/__EMAILJS_TEMPLATE_ID__/g, process.env.EMAILJS_TEMPLATE_ID || '');
            content = content.replace(/__OWNER_NAME__/g, process.env.OWNER_NAME || '');
            content = content.replace(/__OWNER_EMAIL__/g, process.env.OWNER_EMAIL || '');
            content = content.replace(/__OWNER_PHONE__/g, process.env.OWNER_PHONE || '');
            content = content.replace(/__OWNER_LINKEDIN__/g, process.env.OWNER_LINKEDIN || '');
            
            fs.writeFileSync(path, content);
            console.log('Config updated successfully.');
        env:
          AUTH_PASSWORD_HASH: ${{ secrets.AUTH_PASSWORD_HASH }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          OWNER_NAME: ${{ secrets.OWNER_NAME }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          OWNER_PHONE: ${{ secrets.OWNER_PHONE }}
          OWNER_LINKEDIN: ${{ secrets.OWNER_LINKEDIN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
